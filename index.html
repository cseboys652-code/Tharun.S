<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Style Search</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
}

/* CENTER BOX */
.search-box {
    text-align: center;
}

/* GOOGLE STYLE INPUT */
input[type="text"] {
    width: 320px;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input[type="text"]:focus {
    border-color: #4285f4;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #4285f4;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button:hover {
    background: #3367d6;
}
</style>
</head>

<body>

<div class="search-box">
    <h2>Google Style Search</h2>

    <!-- FORMSPREE FORM -->
    <form action="https://formspree.io/f/maqglkkk" method="POST">

        <input type="text" name="search_query" placeholder="Search here..." required>

        <br>

        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>
