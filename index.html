<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container */
.search-box {
    text-align: center;
}

/* input style */
input[type="text"] {
    width: 320px;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 16px;
}

/* button */
button {
    margin-top: 15px;
    padding: 10px 25px;
    border: none;
    border-radius: 20px;
    background: #4285f4;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #2a64c5;
}
</style>
</head>

<body>

<div class="search-box">

    <h2>Search Box</h2>

    <!-- FORMSPREE FORM -->
    <form action="https://formspree.io/f/maqglkkk" method="POST">

        <!-- User search input -->
        <input type="text" name="message" placeholder="Type your search..." required>

        <!-- Optional subject -->
        <input type="hidden" name="_subject" value="New Search Query Received">

        <br>

        <button type="submit">Search</button>

    </form>

</div>

</body>
</html>
